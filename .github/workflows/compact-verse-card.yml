name: Refresh verse card stylesheet cache

on:
  push:
    paths:
      - ".github/workflows/compact-verse-card.yml"

permissions:
  contents: write

jobs:
  refresh-stylesheet-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update stylesheet cache key
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<link rel="stylesheet" href="styles.css?v=20260715-public-holidays" />'
          new = '<link rel="stylesheet" href="styles.css?v=20260716-compact-verse-card" />'

          if old not in text:
              raise SystemExit("Expected stylesheet link not found")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit cache refresh
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No cache-key change detected."
            exit 0
          fi
          git commit -m "chore: refresh stylesheet cache"
          git push
