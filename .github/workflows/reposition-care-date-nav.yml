name: Reposition care date navigation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/reposition-care-date-nav.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move date navigation above timeline
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          lines = text.splitlines()

          content_marker = '<div class="care-pattern-content" id="carePatternContent" aria-live="polite"></div>'
          nav_marker = '<div class="care-pattern-date" id="carePatternDateNav">'

          content_index = next((i for i, line in enumerate(lines) if content_marker in line), None)
          nav_index = next((i for i, line in enumerate(lines) if nav_marker in line), None)

          if content_index is not None and nav_index is not None and nav_index > content_index:
              nav_end = nav_index
              while nav_end < len(lines) and lines[nav_end].strip() != '</div>':
                  nav_end += 1
              if nav_end >= len(lines):
                  raise RuntimeError("care date navigation closing tag not found")

              nav_block = lines[nav_index:nav_end + 1]
              del lines[nav_index:nav_end + 1]
              content_index = next(i for i, line in enumerate(lines) if content_marker in line)
              lines[content_index:content_index] = nav_block

          updated = "\n".join(lines) + "\n"
          updated = updated.replace(
              'config.js?v=20260718-care-date-nav-v1',
              'config.js?v=20260718-care-date-nav-v2',
          )
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit source-order fix
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: render care date navigation above timeline"
          git push
